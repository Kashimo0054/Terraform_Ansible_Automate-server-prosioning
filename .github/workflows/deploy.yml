name: Provision and Configure

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      action:
        description: "Choose action: apply or destroy"
        required: true
        default: apply
      confirm_destroy:
        description: "Type YES to confirm destroy (only needed for destroy)"
        required: false

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init (S3 Backend)
        run: terraform init -reconfigure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      # ✅ APPLY (default behavior)
      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      # 🔥 DESTROY (only with confirmation)
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy == 'YES'
        run: terraform destroy -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      # ❌ Prevent accidental destroy without confirmation
      - name: Fail if destroy not confirmed
        if: github.event.inputs.action == 'destroy' && github.event.inputs.confirm_destroy != 'YES'
        run: |
          echo "❌ Destroy not confirmed. Type YES to proceed."
          exit 1

  ansible:
    runs-on: self-hosted
    needs: terraform

    # 🚫 Skip Ansible if destroy is selected
    if: github.event.inputs.action != 'destroy'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Ansible + Python venv
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-venv python3-pip

          python3 -m venv venv
          source venv/bin/activate

          pip install boto3 botocore
          ansible-galaxy collection install amazon.aws

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PIPELINE_KEYPAIR_PEM }}" > ~/.ssh/pipeline.pem
          chmod 600 ~/.ssh/pipeline.pem

      - name: Verify Dynamic Inventory
        run: |
          source venv/bin/activate
          ansible-inventory -i aws_ec2.yml --graph
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Wait for EC2 to be ready
        run: |
          source venv/bin/activate
          ansible all -i aws_ec2.yml -m wait_for_connection --timeout=300
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Run Ansible Playbook
        run: |
          source venv/bin/activate
          ansible-playbook -i aws_ec2.yml site1.yml \
            --private-key ~/.ssh/pipeline.pem
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
          ANSIBLE_HOST_KEY_CHECKING: False
